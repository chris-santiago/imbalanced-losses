# Weighted CE baseline — pos_weight from data imbalance, no HNM, no oracle.
# epochs, lr, batch_size, queue_size are intentionally absent so they flow from
# the resolved training config (conf/training/default.yaml or capacity.yaml).
kind: ce
capacity: mlp_2x64
early_stop: true
eval_every: 5
# sweep axes (expanded in-process per branch)
wd_sweep: [0.0, 0.0001, 0.001]
