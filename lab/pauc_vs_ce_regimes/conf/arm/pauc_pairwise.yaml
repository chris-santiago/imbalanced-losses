# PAUC pairwise surrogate with CE warmup + temperature anneal.
# epochs, lr, batch_size, queue_size are intentionally absent so they flow from
# the resolved training config (conf/training/default.yaml or capacity.yaml).
# temp, temp_end, warmup_frac, blend_frac are kept as arm-specific defaults
# (different from smoothap; may be overridden via arm_overrides or temp_sweep).
kind: pauc
capacity: mlp_2x64
early_stop: true
eval_every: 5
surrogate: pairwise
temp: 0.5
temp_end: 0.1
warmup_frac: 0.30
blend_frac: 0.15
# sweep axes (expanded in-process per branch)
wd_sweep: [0.0, 0.0001, 0.001]
# band is (alpha_mult, beta_mult) relative to budget; overridden from experiment axes when present
band: [0.5, 1.5]
