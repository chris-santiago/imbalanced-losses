<h1 id="paucatbudgetloss"><code>PAUCAtBudgetLoss</code></h1>
<h2 id="optimizing-recall-at-a-fixed-alert-budget-not-the-whole-curve">Optimizing recall at a fixed alert budget, not the whole curve</h2>
<p>A ranking loss for extreme class imbalance — what it optimizes, why it wins when it wins, and when a weighted cross-entropy is still all you need.</p>
<p><em>imbalanced-losses · for ML practitioners · 2026-07-15</em></p>

<h2 id="the-metric-you-actually-deploy-on">The metric you actually deploy on</h2>
<p>Alerting, fraud review, screening: you can only action the <strong>top <code>b</code> fraction</strong> of scores.</p>
<blockquote>
<p><strong>coverage@budget</strong> — of all positives, what fraction land in the top <code>b</code> of scores (the <strong>alert budget</strong>, e.g. top 0.5% = &quot;50 bps&quot;)? At extreme imbalance this is ≈ <strong>recall at a fixed low FPR</strong> (they coincide as positives become a negligible share of the population).</p>
</blockquote>
<p>This is decided entirely at the <strong>top of the score ranking</strong>. Yet the losses we reach for don't optimize it there:</p>
<ul>
<li><strong>Cross-entropy (CE)</strong> — calibrated per-sample likelihood; gradient spread across the whole distribution, dominated by easy negatives at extreme imbalance.</li>
<li><strong>Smooth-AP / AUCPR</strong> — the <em>whole</em> precision–recall curve.</li>
<li><strong>Recall-at-Quantile</strong> — a <em>single</em> threshold.</li>
</ul>
</section>

<h2 id="the-symptom-that-motivates-a-band-loss">The symptom that motivates a band loss</h2>
<p>Improving the model — more capacity, more data, better features — can <strong>raise mid-range AUCPR while leaving (or degrading) coverage at the operating point.</strong></p>
<p>The model gets better <em>in the bulk</em> and no better <em>where it is deployed</em>.</p>
<p>Whole-curve and per-sample objectives have no special pull on the top of the ranking, so gains land <strong>where the mass is, not where the budget is.</strong></p>
<blockquote>
<p>If your objective is a <strong>band of the ROC around a fixed budget</strong>, optimize that band directly.</p>
</blockquote>
</section>

<h2 id="the-idea-optimize-a-region-of-the-roc">The idea: optimize a region of the ROC</h2>
<p><code>PAUCAtBudgetLoss</code> sits between the two objectives you already know:</p>
<table>
<thead>
<tr>
<th>objective</th>
<th>what it optimizes</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>SmoothAPLoss</code></td>
<td>the <strong>whole</strong> ROC/PR curve</td>
</tr>
<tr>
<td><strong><code>PAUCAtBudgetLoss</code></strong></td>
<td>a <strong>band</strong> <code>[α, β]</code> of the ROC at the budget</td>
</tr>
<tr>
<td><code>RecallAtQuantileLoss</code></td>
<td>a <strong>single</strong> threshold</td>
</tr>
</tbody>
</table>

<h2 id="what-partial-auc-over-a-band-means">What &quot;partial AUC over a band&quot; means</h2>
<p>The band-restricted objective has a clean probabilistic reading — <em>the chance a positive outranks a negative, given that negative sits in the band:</em></p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mrow><mi mathvariant="normal">p</mi><mi mathvariant="normal">A</mi><mi mathvariant="normal">U</mi><mi mathvariant="normal">C</mi></mrow><mtext>norm</mtext></msub><mo stretchy="false">(</mo><mi>α</mi><mo separator="true">,</mo><mi>β</mi><mo stretchy="false">)</mo><mo>=</mo><mi>P</mi><mtext> ⁣</mtext><mrow><mo fence="true">(</mo><msub><mi>s</mi><mi>i</mi></msub><mo>&gt;</mo><msub><mi>s</mi><mi>j</mi></msub><mtext>  </mtext><mo fence="true" lspace="0.05em" rspace="0.05em">|</mo><mtext>  </mtext><mi>i</mi><mo>∈</mo><mi>P</mi><mo separator="true">,</mo><mtext>  </mtext><msub><mi>s</mi><mi>j</mi></msub><mo>∈</mo><mtext>band</mtext><mo fence="true">)</mo></mrow></mrow><annotation encoding="application/x-tex">\mathrm{pAUC}_{\text{norm}}(\alpha,\beta) = P\!\left(s_i &gt; s_j \;\middle|\; i \in P,\; s_j \in \text{band}\right) 
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord"><span class="mord mathrm">pAUC</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.0573em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">norm</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2441em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1.0361em;vertical-align:-0.2861em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">P</span><span class="mspace" style="margin-right:-0.1667em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="minner"><span class="mopen delimcenter" style="top:0em;">(</span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">&gt;</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0572em;">j</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="delimcenter" style="top:0em;">∣</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mord mathnormal">i</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∈</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">P</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0572em;">j</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∈</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mord text"><span class="mord">band</span></span><span class="mclose delimcenter" style="top:0em;">)</span></span></span></span></span></span></p><p><strong>where</strong> <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>s</mi></mrow><annotation encoding="application/x-tex">s</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal">s</span></span></span></span> = model score (logit) · <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>P</mi></mrow><annotation encoding="application/x-tex">P</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.1389em;">P</span></span></span></span> = the positives · <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>s</mi><mi>i</mi></msub><mo separator="true">,</mo><msub><mi>s</mi><mi>j</mi></msub></mrow><annotation encoding="application/x-tex">s_i, s_j</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7167em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal">s</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0572em;">j</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span></span></span></span> = a positive / negative score · <strong>band</strong> = negatives with FPR in <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">[</mo><mi>α</mi><mo separator="true">,</mo><mi>β</mi><mo stretchy="false">]</mo></mrow><annotation encoding="application/x-tex">[\alpha, \beta]</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">[</span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mclose">]</span></span></span></span> (score in <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">[</mo><msub><mi>t</mi><mi>β</mi></msub><mo separator="true">,</mo><msub><mi>t</mi><mi>α</mi></msub><mo stretchy="false">]</mo></mrow><annotation encoding="application/x-tex">[t_\beta, t_\alpha]</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1.0361em;vertical-align:-0.2861em;"></span><span class="mopen">[</span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0528em;">β</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">]</span></span></span></span>) · <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mrow><mi mathvariant="normal">T</mi><mi mathvariant="normal">P</mi><mi mathvariant="normal">R</mi></mrow><mo stretchy="false">(</mo><mi>u</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">\mathrm{TPR}(u)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathrm">TPR</span></span><span class="mopen">(</span><span class="mord mathnormal">u</span><span class="mclose">)</span></span></span></span> = recall at FPR <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>u</mi></mrow><annotation encoding="application/x-tex">u</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal">u</span></span></span></span>.</p>
<p>Because the band holds exactly <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">(</mo><mi>β</mi><mo>−</mo><mi>α</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">(\beta - \alpha)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mclose">)</span></span></span></span> of the negatives, that probability <strong>equals the normalized area under the ROC inside the band</strong>, <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msubsup><mo>∫</mo><mi>α</mi><mi>β</mi></msubsup><mrow><mi mathvariant="normal">T</mi><mi mathvariant="normal">P</mi><mi mathvariant="normal">R</mi></mrow><mo stretchy="false">(</mo><mi>u</mi><mo stretchy="false">)</mo><mtext> </mtext><mi>d</mi><mi>u</mi><mtext> </mtext><mi mathvariant="normal">/</mi><mtext> </mtext><mo stretchy="false">(</mo><mi>β</mi><mo>−</mo><mi>α</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">\int_\alpha^\beta \mathrm{TPR}(u)\,du \,/\, (\beta - \alpha)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1.3998em;vertical-align:-0.3558em;"></span><span class="mop"><span class="mop op-symbol small-op" style="margin-right:0.1945em;position:relative;top:-0.0006em;">∫</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.044em;"><span style="top:-2.3442em;margin-left:-0.1945em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span><span style="top:-3.2579em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0528em;">β</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.3558em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathrm">TPR</span></span><span class="mopen">(</span><span class="mord mathnormal">u</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal">d</span><span class="mord mathnormal">u</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord">/</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mclose">)</span></span></span></span> — a <strong>consistent plug-in estimator</strong> (more data → the true partial AUC), not a heuristic.</p>
<blockquote>
<p><code>loss = 1 − pAUC</code> — training maximizes the outranking probability at the operating point.</p>
</blockquote>

<h2 id="band-edges-iid-anchored-stop-gradient">Band edges: iid-anchored, stop-gradient</h2>
<p>The two edges are <strong>score quantiles of the iid negatives</strong>, detached (no gradient):</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>t</mi><mi>α</mi></msub><mo>=</mo><mrow><mi mathvariant="normal">q</mi><mi mathvariant="normal">u</mi><mi mathvariant="normal">a</mi><mi mathvariant="normal">n</mi><mi mathvariant="normal">t</mi><mi mathvariant="normal">i</mi><mi mathvariant="normal">l</mi><mi mathvariant="normal">e</mi></mrow><mo stretchy="false">(</mo><msub><mtext>neg</mtext><mtext>iid</mtext></msub><mo separator="true">,</mo><mtext> </mtext><mn>1</mn><mo>−</mo><mi>α</mi><mo stretchy="false">)</mo><mo separator="true">,</mo><mspace width="2em"/><msub><mi>t</mi><mi>β</mi></msub><mo>=</mo><mrow><mi mathvariant="normal">q</mi><mi mathvariant="normal">u</mi><mi mathvariant="normal">a</mi><mi mathvariant="normal">n</mi><mi mathvariant="normal">t</mi><mi mathvariant="normal">i</mi><mi mathvariant="normal">l</mi><mi mathvariant="normal">e</mi></mrow><mo stretchy="false">(</mo><msub><mtext>neg</mtext><mtext>iid</mtext></msub><mo separator="true">,</mo><mtext> </mtext><mn>1</mn><mo>−</mo><mi>β</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">t_\alpha = \mathrm{quantile}(\text{neg}_{\text{iid}},\, 1-\alpha), \qquad t_\beta = \mathrm{quantile}(\text{neg}_{\text{iid}},\, 1-\beta) 
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathrm">quantile</span></span><span class="mopen">(</span><span class="mord"><span class="mord text"><span class="mord">neg</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.242em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">iid</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2441em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1.0361em;vertical-align:-0.2861em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mclose">)</span><span class="mpunct">,</span><span class="mspace" style="margin-right:2em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0528em;">β</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathrm">quantile</span></span><span class="mopen">(</span><span class="mord"><span class="mord text"><span class="mord">neg</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.242em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">iid</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2441em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mclose">)</span></span></span></span></span></p><p><strong>where</strong> <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mrow><mi mathvariant="normal">n</mi><mi mathvariant="normal">e</mi><mi mathvariant="normal">g</mi></mrow><mtext>iid</mtext></msub></mrow><annotation encoding="application/x-tex">\mathrm{neg}_{\text{iid}}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6747em;vertical-align:-0.2441em;"></span><span class="mord"><span class="mord"><span class="mord mathrm" style="margin-right:0.0139em;">neg</span></span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.242em;"><span style="top:-2.4559em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">iid</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2441em;"><span></span></span></span></span></span></span></span></span></span> = the iid-flagged negatives · <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mrow><mi mathvariant="normal">q</mi><mi mathvariant="normal">u</mi><mi mathvariant="normal">a</mi><mi mathvariant="normal">n</mi><mi mathvariant="normal">t</mi><mi mathvariant="normal">i</mi><mi mathvariant="normal">l</mi><mi mathvariant="normal">e</mi></mrow><mo stretchy="false">(</mo><mo>⋅</mo><mo separator="true">,</mo><mtext> </mtext><mn>1</mn><mo>−</mo><mi>α</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">\mathrm{quantile}(\cdot,\, 1-\alpha)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathrm">quantile</span></span><span class="mopen">(</span><span class="mord">⋅</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord">1</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mclose">)</span></span></span></span> = the score with a fraction <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>α</mi></mrow><annotation encoding="application/x-tex">\alpha</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span></span></span></span> of negatives above it, so a threshold there has <strong>FPR <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo>=</mo><mi>α</mi></mrow><annotation encoding="application/x-tex">= \alpha</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.3669em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span></span></span></span></strong> · <em>detached</em> = a stop-gradient constant.</p>
<p>A negative is &quot;in the band&quot; iff <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>t</mi><mi>β</mi></msub><mo>≤</mo><mi>s</mi><mo>≤</mo><msub><mi>t</mi><mi>α</mi></msub></mrow><annotation encoding="application/x-tex">t_\beta \le s \le t_\alpha</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.9221em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0528em;">β</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">≤</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7719em;vertical-align:-0.136em;"></span><span class="mord mathnormal">s</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">≤</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> — exactly FPR in <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">[</mo><mi>α</mi><mo separator="true">,</mo><mi>β</mi><mo stretchy="false">]</mo></mrow><annotation encoding="application/x-tex">[\alpha, \beta]</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">[</span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mclose">]</span></span></span></span>.</p>
<ul>
<li><strong>iid-anchored</strong> → <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>β</mi></mrow><annotation encoding="application/x-tex">\beta</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span></span></span></span> keeps meaning <em>population FPR</em> even if the pipeline densifies the batch with hard negatives (edges don't move).</li>
<li><strong>Recommended default <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>α</mi><mo>=</mo><mn>0</mn><mo separator="true">,</mo><mtext> </mtext><mi>β</mi><mo>=</mo><mtext>budget</mtext></mrow><annotation encoding="application/x-tex">\alpha = 0,\ \beta = \text{budget}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.0037em;">α</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord">0</span><span class="mpunct">,</span><span class="mspace"> </span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord text"><span class="mord">budget</span></span></span></span></span></strong> → <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>t</mi><mi>α</mi></msub><mo>=</mo><mi>max</mi><mo>⁡</mo><mo stretchy="false">(</mo><mtext>neg</mtext><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">t_\alpha = \max(\text{neg})</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mop">max</span><span class="mopen">(</span><span class="mord text"><span class="mord">neg</span></span><span class="mclose">)</span></span></span></span>, so the band covers <strong>every</strong> false-positive above the budget threshold.</li>
</ul>

<h2 id="two-surrogates--and-they-behave-differently">Two surrogates — and they behave differently</h2>

<p><strong>Trapezoid</strong> (default) — lifts soft-TPR over detached thresholds; <strong>gradient through positives only:</strong></p>

<h2 id="scale-aware-temperature-why-%CF%84-isnt-a-raw-logit-knob">Scale-aware temperature (why τ isn't a raw logit knob)</h2>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>τ</mi><mtext>eff</mtext></msub><mo>=</mo><mtext>temperature</mtext><mo>×</mo><mtext>scale</mtext><mspace width="2em"/><mo stretchy="false">(</mo><mtext>scale detached</mtext><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">\tau_{\text{eff}} = \text{temperature} \times \text{scale} \qquad (\text{scale detached}) 
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.5806em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.1132em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">eff</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8095em;vertical-align:-0.1944em;"></span><span class="mord text"><span class="mord">temperature</span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">×</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord text"><span class="mord">scale</span></span><span class="mspace" style="margin-right:2em;"></span><span class="mopen">(</span><span class="mord text"><span class="mord">scale detached</span></span><span class="mclose">)</span></span></span></span></span></p><p><strong>where</strong> <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>τ</mi><mtext>eff</mtext></msub></mrow><annotation encoding="application/x-tex">\tau_{\text{eff}}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.5806em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.1132em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">eff</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> = the sigmoid's width (the <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>τ</mi></mrow><annotation encoding="application/x-tex">\tau</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span></span></span></span> in every <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>σ</mi><mo stretchy="false">(</mo><mo>⋅</mo><mi mathvariant="normal">/</mi><mi>τ</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">\sigma(\cdot/\tau)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">σ</span><span class="mopen">(</span><span class="mord">⋅</span><span class="mord">/</span><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span><span class="mclose">)</span></span></span></span>) · <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mtext>scale</mtext></mrow><annotation encoding="application/x-tex">\text{scale}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord text"><span class="mord">scale</span></span></span></span></span> = a robust spread of the iid negatives (<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi mathvariant="normal">I</mi><mi mathvariant="normal">Q</mi><mi mathvariant="normal">R</mi></mrow><annotation encoding="application/x-tex">\mathrm{IQR}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8778em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathrm">IQR</span></span></span></span></span>, or band width <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>t</mi><mi>α</mi></msub><mo>−</mo><msub><mi>t</mi><mi>β</mi></msub></mrow><annotation encoding="application/x-tex">t_\alpha - t_\beta</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7651em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0037em;">α</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.9012em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight" style="margin-right:0.0528em;">β</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span></span></span></span>).</p>
<p><img src="assets/concept_tau_scale.svg" alt="" style="width:720px;" /></p>
<blockquote>
<p>A fixed raw τ saturates <em>exactly when overfitting begins.</em> Tying <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>τ</mi><mtext>eff</mtext></msub><mo>∝</mo><mtext>scale</mtext></mrow><annotation encoding="application/x-tex">\tau_{\text{eff}} \propto \text{scale}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.5806em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.1132em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">eff</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∝</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord text"><span class="mord">scale</span></span></span></span></span> keeps <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">(</mo><mi>s</mi><mo>−</mo><mi>t</mi><mo stretchy="false">)</mo><mi mathvariant="normal">/</mi><msub><mi>τ</mi><mtext>eff</mtext></msub></mrow><annotation encoding="application/x-tex">(s - t)/\tau_{\text{eff}}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mord mathnormal">s</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mord">/</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.1132em;">τ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.1132em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">eff</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> constant as logits inflate → <strong>scale-invariant</strong> (loss identical, gradient cosine 1.0).</p>

<h2 id="headline-when-does-it-beat-well-tuned-ce">Headline: <em>when</em> does it beat well-tuned CE?</h2>
<p>Hold the <strong>same two features</strong> fixed; vary only the <strong>functional form</strong> of the cue separating positives from decoys at the top. Cue linearity — not capacity, ratio, or bulk difficulty — is the determinant:</p>
<p><img src="assets/fig_headline_cue_nonlinearity.png" alt="" style="width:840px;" /></p>
<p>CE captures a <strong>linear</strong> cue cheaply (+0.015); a <strong>nonlinear</strong> cue relevant only to the rare top → pairwise recovers <strong>~+0.21</strong>, replicated across two forms. <em>(8 seeds, bootstrap CIs.)</em></p>
</section>

<h2 id="two-honest-qualifiers-same-study">Two honest qualifiers (same study)</h2>

<p>Both come straight from the ablation — the win is <strong>narrow and conditional</strong>:</p>
<table>
<thead>
<tr>
<th></th>
<th></th>
</tr>
</thead>
<tbody>
<tr>
<td><img src="assets/fig_metric_specificity.png" alt="" style="width:430px;" /></td>
<td><img src="assets/fig_headline_budget.png" alt="" style="width:430px;" /></td>
</tr>
<tr>
<td><strong>Operating-point specific.</strong> AUROC stays ~0.99 across cells — coverage@budget moves, the whole-curve ranker does <em>not</em> get better.</td>
<td><strong>Budget-dependent.</strong> The nonlinear lift falls <strong>+0.216 @ 50 bps → +0.045 @ 100 bps.</strong> A wider budget is easier for CE.</td>
</tr>
</tbody>
</table>
<blockquote>
<p>Largest at the <strong>tightest</strong> budgets — needs an MLP, CE warmup, and temperature annealing.</p>
</blockquote>

<h2 id="surrogate-choice-is-not-free">Surrogate choice is not free</h2>
<p>Within the favorable (contested-negative-top) regime, <strong>only <code>pairwise</code> survives</strong>:</p>
<p><img src="assets/fig_surrogate.png" alt="" style="width:520px;" /></p>
<ul>
<li><strong>pairwise</strong> (green) carries the advantage — it suppresses the band negatives.</li>
<li><strong>trapezoid</strong> (red) collapses to the trivial floor — lifts positives only.</li>
<li><code>SmoothAP</code> (purple) — strong whole-curve baseline, but not at the operating point.</li>
</ul>

<h2 id="why-it-wins-the-band-is-a-hard-negative-miner">Why it wins: the band <em>is</em> a hard-negative miner</h2>
<p><img src="assets/concept_hnm_axis.svg" alt="" style="width:620px;" /></p>
<p>The pairwise band contrasts each positive against the negatives at the top of the ranking — <strong>by construction those are the decoys.</strong> On identical data and scores:</p>
<ul>
<li>Band is <strong>~73% decoys against a 1.2% base rate</strong> — <strong>~60× enrichment</strong>, with <strong>no decoy labels.</strong></li>
<li>PAUC puts <strong>~96% of negative-gradient mass on decoys</strong> vs <strong>~58% for CE.</strong></li>
</ul>
</section>

<h2 id="its-allocation-not-capacity--and-ce-can-copy-it">It's allocation, not capacity — and CE can copy it</h2>
<p>If PAUC merely <em>represented</em> the cue better, concentrating CE's gradient wouldn't help. <strong>It does:</strong></p>
<table>
<thead>
<tr>
<th>variant</th>
<th style="text-align:right">coverage@50bps</th>
<th>note</th>
</tr>
</thead>
<tbody>
<tr>
<td>Weighted CE</td>
<td style="text-align:right">0.576</td>
<td>baseline</td>
</tr>
<tr>
<td>CE + oracle decoy up-weight ×10</td>
<td style="text-align:right">0.767</td>
<td><em>uses</em> decoy labels</td>
</tr>
<tr>
<td>CE + label-free top-score HNM</td>
<td style="text-align:right">0.765</td>
<td>no labels — mines the top negatives</td>
</tr>
<tr>
<td><strong>PAUC pairwise</strong></td>
<td style="text-align:right"><strong>0.792</strong></td>
<td>adaptive, label-free</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>Honesty:</strong> a label-free hard-negative-mined CE reproduces most of the gap (matches/beats PAUC in 3 of 4 cells). The partial-AUC objective has <strong>no higher ceiling</strong> here — its edge is delivering the concentration <strong>adaptively, without a tuned factor or labels.</strong></p>
</blockquote>
</section>

<h2 id="one-knob-that-matters-dont-let-decoys-escape-the-band">One knob that matters: don't let decoys escape the band</h2>
<p>The decoys pile up at the very top — but gradient only reaches <code>[α, β]</code>. The <strong>old</strong> default <code>[budget/2, 1.5·budget]</code> let <strong>21–41% of decoys escape above <code>t_α</code></strong> (no gradient).</p>
<p><img src="assets/fig_alpha_widen.png" alt="" style="width:470px;" /></p>
<blockquote>
<p>Lowering <strong><code>α → 0</code></strong> widens the band to <code>t_α = max(neg)</code>, covering the escaped decoys: <strong>+0.017 to +0.056</strong> per cell. The sweep's robust optimum — <strong><code>α = 0, β = budget</code></strong> — is now the default.</p>
</blockquote>
</section>

<h2 id="when-to-reach-for-it--and-when-not">When to reach for it — and when not</h2>
<p><strong>Use <code>PAUCAtBudgetLoss</code> when:</strong></p>
<ul>
<li>Deployment metric is <strong>recall at a fixed low FP budget</strong> (alerting, fraud, screening).</li>
<li>The top is <strong>contested by hard negatives</strong> → <code>surrogate=&quot;pairwise&quot;</code>.</li>
<li>Pool (batch + queue + DDP gather) holds <strong>≫ <code>1/β</code></strong> iid negatives.</li>
</ul>
<p><strong>Prefer something else when:</strong></p>
<ul>
<li>The top is <strong>cleanly separable</strong> → well-weighted CE or <code>SmoothAPLoss</code> is hard to beat.</li>
<li>You care about the <strong>whole</strong> ranking → <code>SmoothAPLoss</code>; a <strong>single threshold</strong> → <code>RecallAtQuantileLoss</code>.</li>
<li>The pool can't supply a stable band-edge quantile at your <code>β</code>.</li>
</ul>
</section>

<h2 id="configuration-cheat-sheet">Configuration cheat-sheet</h2>

<table>
<thead>
<tr>
<th>situation</th>
<th>setting</th>
</tr>

<tbody>
<tr>
<td><strong>band</strong> (start here)</td>
<td><code>alpha=0.0, beta=budget</code> (e.g. <code>beta=0.005</code> @ 50 bps)</td>
</tr>
<tr>
<td>contested-negative top</td>
<td><code>surrogate=&quot;pairwise&quot;</code>, <code>pos_numerator=&quot;pool&quot;</code></td>
</tr>
<tr>
<td>non-contested top, few live positives + big queue</td>

</tr>
<tr>
<td>stability</td>
<td><code>tau_scale=&quot;iqr&quot;</code>, <code>temperature≈0.1</code></td>
</tr>
<tr>
<td>wide / volatile band</td>
<td><code>tau_scale=&quot;band&quot;</code>, <code>temperature≈1.0</code></td>
</tr>
</tbody>
</table>
<ul>
<li>Train it with <strong>CE warmup → blend → PAUC</strong> (temperature anneal ~0.5→0.1) via <code>LossWarmupWrapper</code>.</li>

<h2 id="limitations--read-before-adopting">Limitations — read before adopting</h2>
<ul>
<li><strong>Strong baseline.</strong> Weighted CE is hard to beat on separable tops; wins are <strong>regime-specific</strong> and, on synthetic data, modest and seed-noisy.</li>
<li><strong>Surrogate is regime-dependent.</strong> No single dominant surrogate (trapezoid ↔ non-contested, pairwise ↔ contested). <code>pos_numerator</code> flips with it — a real config burden.</li>
<li><strong>Tail-quantile sensitivity.</strong> Small pools give a biased, jittery band edge. Needs pool ≫ <code>1/β</code>.</li>
<li><strong>No large-scale benchmark validation.</strong> Evidence = controlled synthetic studies + one small real dataset; not validated against published deep-pAUC methods.</li>
</ul>
<blockquote>
<p>Gated on a <strong>per-deployment adoption diagnostic</strong> and <strong>validation on real data</strong> before rollout.</p>
</blockquote>
</section>

<h1 id="takeaways">Takeaways</h1>
<p><strong>Optimize the band you deploy on.</strong> <code>PAUCAtBudgetLoss</code> targets coverage@budget directly.</p>
<p><strong>It wins when the top is contested by a cue CE under-learns</strong> — pairwise surrogate, wide band (<code>α=0</code>), ~+0.21 in the favorable regime.</p>
<p><strong>The mechanism is gradient allocation</strong> — a label-free HNM-CE gets you most of the way; PAUC delivers it adaptively, without labels.</p>
<p><em>Deep dive: <code>docs/explanation/pauc-at-budget-deep-dive.md</code> · Study: <code>lab/pauc_vs_ce_regimes/</code></em></p>
</section>
